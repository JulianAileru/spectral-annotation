;==============================================
; Lib2NIST output options for MS/MS spectral libraries.
; [Directory] paths are injected at runtime by lib2nist_convert.sh.
; Lines starting with semicolons are comments.
;==============================================
[Output]
; 1=>Produce NIST MS Library, 0=>No
DB=1
; 1=>Produce MS ASCII text file, 0=>No
Text=0
; Output MS ASCII file type: 0=>MSP, 1=>HP-JCAMP, 2=>SDF
TextFileType=0
; 1=>Calculate normalized MW from chemical formula, 0=>get MW from the input
CalcMW=1
; 1=>Include synonyms, 0=>do not include
IncludeSynonyms=1
; 0=>Auto-assign IDs (1,2,3,...), 1=>preserve IDs from input
KeepIDs=1
; MOLfile output: 0=>None, 1=>names from ID, 2=>from CAS, 3=>Both
LinkMOLfile=0
; m/z transformation: floor((input m/z)*MzMpy + MzAdd + 0.5)
MzAdd=0
MzMpy=1
; 1=>treat as MS/MS spectra (required for metabolomics LC-MS/MS data); 0=>EI
MsmsOnly=1
; 1=>compatible with MS Search 2008; 0=>compatible with newer MSPepSearch64
Msms2008-Compat=0
